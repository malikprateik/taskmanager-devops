<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
        }

        /* sidebar */
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #e5e5e7;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-logo .dot {
            width: 10px;
            height: 10px;
            background: #0071e3;
            border-radius: 3px;
        }

        .sidebar-nav { list-style: none; flex: 1; }

        .sidebar-nav li {
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #6e6e73;
            margin-bottom: 0.2rem;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-nav li:hover { background: #f5f5f7; color: #1d1d1f; }
        .sidebar-nav li.active { background: #0071e3; color: #fff; }

        .nav-count {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.06);
            padding: 0.15rem 0.45rem;
            border-radius: 10px;
            font-weight: 500;
        }

        .sidebar-nav li.active .nav-count {
            background: rgba(255,255,255,0.25);
        }

        .sidebar-stats {
            border-top: 1px solid #e5e5e7;
            padding-top: 1rem;
            font-size: 0.75rem;
            color: #86868b;
        }

        .sidebar-stats div { margin-bottom: 0.4rem; }
        .sidebar-stats span { color: #1d1d1f; font-weight: 600; }

        /* main content */
        .main {
            flex: 1;
            padding: 2rem 2.5rem;
            max-width: 850px;
        }

        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .main-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* add task */
        .add-area {
            background: #fff;
            border: 1px solid #e5e5e7;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .add-area input[type=text] {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            color: #1d1d1f;
            background: transparent;
        }

        .add-area input::placeholder { color: #aeaeb2; }

        .add-area select {
            border: 1px solid #e5e5e7;
            border-radius: 6px;
            padding: 0.4rem 0.5rem;
            font-size: 0.78rem;
            font-family: 'Inter', sans-serif;
            color: #6e6e73;
            background: #f5f5f7;
            cursor: pointer;
            outline: none;
        }

        .btn-add {
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-add:hover { background: #0077ed; }

        /* task cards */
        .task-list { display: flex; flex-direction: column; gap: 0.4rem; }

        .task-card {
            background: #fff;
            border: 1px solid #e5e5e7;
            border-radius: 10px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: box-shadow 0.15s;
        }

        .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .task-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #d1d1d6;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-check:hover { border-color: #0071e3; }
        .task-check.done { background: #34c759; border-color: #34c759; }
        .task-check.done::after { content: '\2713'; color: #fff; font-size: 11px; }

        .task-body { flex: 1; min-width: 0; }

        .task-title {
            font-size: 0.88rem;
            font-weight: 500;
            margin-bottom: 0.15rem;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: #aeaeb2;
        }

        .task-desc {
            font-size: 0.76rem;
            color: #86868b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-right {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .priority-dot.low { background: #34c759; }
        .priority-dot.medium { background: #ff9f0a; }
        .priority-dot.high { background: #ff3b30; }
        .priority-dot.critical { background: #ff3b30; box-shadow: 0 0 0 2px rgba(255,59,48,0.25); }

        .status-label {
            font-size: 0.68rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }

        .status-label.pending { background: #f5f5f7; color: #86868b; }
        .status-label.in_progress { background: #e8f0fe; color: #0071e3; }
        .status-label.completed { background: #e8f8ed; color: #248a3d; }
        .status-label.cancelled { background: #fef0ef; color: #d70015; }

        .btn-del {
            opacity: 0;
            border: none;
            background: none;
            color: #aeaeb2;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem;
            transition: all 0.15s;
        }

        .task-card:hover .btn-del { opacity: 1; }
        .btn-del:hover { color: #ff3b30; }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #aeaeb2;
            font-size: 0.9rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1d1d1f;
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: all 0.25s;
            z-index: 99;
        }

        .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><div class="dot"></div> Task Manager</div>
        <ul class="sidebar-nav" id="navList">
            <li class="active" onclick="setFilter('all', this)">All Tasks <span class="nav-count" id="cAll">0</span></li>
            <li onclick="setFilter('pending', this)">Pending <span class="nav-count" id="cPending">0</span></li>
            <li onclick="setFilter('in_progress', this)">In Progress <span class="nav-count" id="cProgress">0</span></li>
            <li onclick="setFilter('completed', this)">Completed <span class="nav-count" id="cDone">0</span></li>
            <li onclick="setFilter('cancelled', this)">Cancelled <span class="nav-count" id="cCancel">0</span></li>
        </ul>
        <div class="sidebar-stats">
            <div>Total tasks: <span id="sTotal">0</span></div>
            <div>Completion rate: <span id="sRate">0%</span></div>
        </div>
    </aside>

    <main class="main">
        <div class="main-header">
            <h1 id="pageTitle">All Tasks</h1>
        </div>

        <div class="add-area">
            <input type="text" id="inTitle" placeholder="What needs to be done?">
            <input type="text" id="inDesc" placeholder="Details..." style="max-width:180px">
            <select id="inPri">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
            <button class="btn-add" onclick="addTask()">Add</button>
        </div>

        <div class="task-list" id="taskList">
            <div class="empty">No tasks yet</div>
        </div>
    </main>
</div>

<div class="toast-msg" id="toast"></div>

<script>
    let filter = 'all';

    async function load() {
        try {
            const url = filter === 'all' ? '/tasks' : '/tasks?status=' + filter;
            const r = await fetch(url);
            const d = await r.json();
            render(d.tasks);
            counts();
        } catch(e) {
            document.getElementById('taskList').innerHTML = '<div class="empty">Cannot reach API</div>';
        }
    }

    async function counts() {
        try {
            const r = await fetch('/tasks');
            const d = await r.json();
            const all = d.tasks;
            const p = all.filter(t => t.status === 'pending').length;
            const ip = all.filter(t => t.status === 'in_progress').length;
            const c = all.filter(t => t.status === 'completed').length;
            const x = all.filter(t => t.status === 'cancelled').length;
            document.getElementById('cAll').textContent = all.length;
            document.getElementById('cPending').textContent = p;
            document.getElementById('cProgress').textContent = ip;
            document.getElementById('cDone').textContent = c;
            document.getElementById('cCancel').textContent = x;
            document.getElementById('sTotal').textContent = all.length;
            document.getElementById('sRate').textContent = all.length ? Math.round(c / all.length * 100) + '%' : '0%';
        } catch(e) {}
    }

    function render(tasks) {
        const el = document.getElementById('taskList');
        if (!tasks.length) { el.innerHTML = '<div class="empty">No tasks here</div>'; return; }
        el.innerHTML = tasks.map(t => {
            const isDone = t.status === 'completed';
            return '<div class="task-card' + (isDone ? ' completed' : '') + '">' +
                '<div class="task-check' + (isDone ? ' done' : '') + '" onclick="cycle(' + t.id + ',\'' + t.status + '\')"></div>' +
                '<div class="task-body">' +
                    '<div class="task-title">' + esc(t.title) + '</div>' +
                    (t.description ? '<div class="task-desc">' + esc(t.description) + '</div>' : '') +
                '</div>' +
                '<div class="task-right">' +
                    '<div class="priority-dot ' + t.priority + '" title="' + t.priority + '"></div>' +
                    '<span class="status-label ' + t.status + '">' + t.status.replace('_', ' ') + '</span>' +
                    '<button class="btn-del" onclick="del(' + t.id + ')">&times;</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function addTask() {
        const t = document.getElementById('inTitle').value.trim();
        if (!t) return;
        const desc = document.getElementById('inDesc').value.trim();
        const pri = document.getElementById('inPri').value;
        await fetch('/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title: t, description: desc, priority: pri})
        });
        document.getElementById('inTitle').value = '';
        document.getElementById('inDesc').value = '';
        toast('Task added');
        load();
    }

    async function cycle(id, st) {
        const o = ['pending', 'in_progress', 'completed'];
        const n = o[(o.indexOf(st) + 1) % o.length];
        await fetch('/tasks/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: n})
        });
        toast('Moved to ' + n.replace('_', ' '));
        load();
    }

    async function del(id) {
        await fetch('/tasks/' + id, {method: 'DELETE'});
        toast('Deleted');
        load();
    }

    function setFilter(f, el) {
        filter = f;
        document.querySelectorAll('.sidebar-nav li').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const names = {all: 'All Tasks', pending: 'Pending', in_progress: 'In Progress', completed: 'Completed', cancelled: 'Cancelled'};
        document.getElementById('pageTitle').textContent = names[f];
        load();
    }

    function toast(m) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    document.getElementById('inTitle').addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });
    load();
</script>
</body>
</html>
