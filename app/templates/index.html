<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .app-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-badge {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 0.4rem 0.9rem;
            font-size: 0.8rem;
            color: #a0a0b8;
        }

        .stat-badge span {
            color: #667eea;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* create task form */
        .create-form {
            background: linear-gradient(135deg, #1a1a2e, #1e1e36);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .create-form h2 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #b0b0c8;
        }

        .form-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .form-row input, .form-row select {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row input::placeholder { color: #555; }

        .btn-create {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1.4rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-create:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-create:active { transform: translateY(0); }

        /* filter bar */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            color: #888;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover { border-color: #667eea; color: #667eea; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }

        /* task list */
        .task-list { display: flex; flex-direction: column; gap: 0.6rem; }

        .task-card {
            background: linear-gradient(135deg, #1a1a2e, #1e1e36);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: border-color 0.2s, transform 0.15s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-card:hover { border-color: rgba(102,126,234,0.3); transform: translateY(-2px); }

        .task-info { flex: 1; }

        .task-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .task-desc {
            font-size: 0.8rem;
            color: #666;
        }

        .task-meta {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            font-size: 0.68rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-pending { background: rgba(245,166,35,0.15); color: #f5a623; }
        .badge-in_progress { background: rgba(52,152,219,0.15); color: #3498db; }
        .badge-completed { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .badge-cancelled { background: rgba(231,76,60,0.15); color: #e74c3c; }

        .badge-low { background: rgba(46,204,113,0.1); color: #2ecc71; }
        .badge-medium { background: rgba(245,166,35,0.1); color: #f5a623; }
        .badge-high { background: rgba(231,76,60,0.1); color: #e74c3c; }
        .badge-critical { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

        .task-actions {
            display: flex;
            gap: 0.4rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-card:hover .task-actions { opacity: 1; }

        .btn-icon {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            color: #888;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-icon:hover { border-color: #667eea; color: #667eea; }
        .btn-icon.delete:hover { border-color: #e74c3c; color: #e74c3c; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #555;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a1a2e;
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            font-size: 0.82rem;
            color: #667eea;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<header class="app-header">
    <h1>Task Manager</h1>
    <div class="header-stats">
        <div class="stat-badge">Total: <span id="totalCount">0</span></div>
        <div class="stat-badge">Pending: <span id="pendingCount">0</span></div>
        <div class="stat-badge">Completed: <span id="completedCount">0</span></div>
    </div>
</header>

<div class="container">
    <div class="create-form">
        <h2>New Task</h2>
        <div class="form-row">
            <input type="text" id="taskTitle" placeholder="Task title...">
            <input type="text" id="taskDesc" placeholder="Description (optional)">
        </div>
        <div class="form-row">
            <select id="taskPriority">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
                <option value="critical">Critical Priority</option>
            </select>
            <button class="btn-create" onclick="createTask()">Add Task</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterTasks('in_progress', this)">In Progress</button>
        <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
        <button class="filter-btn" onclick="filterTasks('cancelled', this)">Cancelled</button>
    </div>

    <div class="task-list" id="taskList">
        <div class="empty-state">No tasks yet. Create one above!</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '';
    let currentFilter = 'all';

    async function loadTasks() {
        try {
            const url = currentFilter === 'all' ? `${API}/tasks` : `${API}/tasks?status=${currentFilter}`;
            const res = await fetch(url);
            const data = await res.json();
            renderTasks(data.tasks);
            updateCounts();
        } catch(e) {
            document.getElementById('taskList').innerHTML = '<div class="empty-state">Could not connect to API</div>';
        }
    }

    async function updateCounts() {
        try {
            const res = await fetch(`${API}/tasks`);
            const data = await res.json();
            document.getElementById('totalCount').textContent = data.count;
            const pending = data.tasks.filter(t => t.status === 'pending').length;
            const completed = data.tasks.filter(t => t.status === 'completed').length;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;
        } catch(e) {}
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        if (!tasks.length) {
            list.innerHTML = '<div class="empty-state">No tasks found</div>';
            return;
        }
        list.innerHTML = tasks.map(t => `
            <div class="task-card">
                <div class="task-info">
                    <div class="task-title">${escHtml(t.title)}</div>
                    <div class="task-desc">${escHtml(t.description || '')}</div>
                </div>
                <div class="task-meta">
                    <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
                    <span class="badge badge-${t.priority}">${t.priority}</span>
                </div>
                <div class="task-actions">
                    <button class="btn-icon" onclick="cycleStatus(${t.id}, '${t.status}')">Next</button>
                    <button class="btn-icon delete" onclick="deleteTask(${t.id})">Del</button>
                </div>
            </div>
        `).join('');
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    async function createTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return;
        const desc = document.getElementById('taskDesc').value.trim();
        const priority = document.getElementById('taskPriority').value;
        await fetch(`${API}/tasks`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title, description: desc, priority})
        });
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        showToast('Task created');
        loadTasks();
    }

    async function cycleStatus(id, current) {
        const order = ['pending', 'in_progress', 'completed'];
        const next = order[(order.indexOf(current) + 1) % order.length];
        await fetch(`${API}/tasks/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: next})
        });
        showToast(`Status → ${next.replace('_',' ')}`);
        loadTasks();
    }

    async function deleteTask(id) {
        await fetch(`${API}/tasks/${id}`, {method: 'DELETE'});
        showToast('Task deleted');
        loadTasks();
    }

    function filterTasks(status, btn) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadTasks();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // allow enter key to create task
    document.getElementById('taskTitle').addEventListener('keypress', e => {
        if (e.key === 'Enter') createTask();
    });

    loadTasks();
</script>
</body>
</html>
