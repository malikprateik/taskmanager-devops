# Prometheus configuration for Task Manager monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "taskmanager-staging"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:5001"]
        labels:
          environment: "staging"
          app: "taskmanager"

  - job_name: "taskmanager-prod"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:5000"]
        labels:
          environment: "production"
          app: "taskmanager"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
